{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="container">
    <h2>Регистрация</h2>
    <div id="msg-box" class="msg-box" style="display: none;"></div>
    
    <form id="regForm">
        <label for="login">Логин:</label>
        <input type="text" id="login" name="login" required autocomplete="username">
        
        <label for="password">Пароль:</label>
        <input type="password" id="password" name="password" required autocomplete="new-password">
        
        <button type="submit">Зарегистрироваться</button>
    </form>
</div>

<script>
const form = document.getElementById('regForm');
const msgBox = document.getElementById('msg-box');

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msgBox.style.display = 'none';

    const payload = { login: form.login.value, password: form.password.value };

    try {
        const res = await fetch("{{ url_for('auth.register') }}", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        msgBox.style.display = 'block';

        if (res.ok) {
            window.location.href = "{{ url_for('auth.login_page') }}";
        } else {
            msgBox.className = 'error';
            msgBox.textContent = data.error || 'Ошибка регистрации';
        }
    } catch {
        msgBox.style.display = 'block';
        msgBox.className = 'error';
        msgBox.textContent = 'Ошибка сети';
    }
});
</script>
{% endblock %}
