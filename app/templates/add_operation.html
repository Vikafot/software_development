{% extends "base.html" %}
{% block title %}Добавить операцию{% endblock %}

{% block content %}
<div class="container">
    <h2>Добавить операцию</h2>
    <form id="opForm">
        <label for="type_operation">Тип:</label>
        <select name="type_operation" id="type_operation" required>
            <option value="income">Доход</option>
            <option value="expense">Расход</option>
        </select>
        
        <label for="sum">Сумма (RUB):</label>
        <input type="number" step="0.01" id="sum" name="sum" required>
        
        <label for="date">Дата:</label>
        <input type="datetime-local" id="date" name="date" required>
        
        <label for="chat_id">Chat ID (опционально):</label>
        <input type="text" id="chat_id" name="chat_id">
        
        <button type="submit">Добавить</button>
    </form>
</div>

<script>
document.getElementById('opForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    data.sum = parseFloat(data.sum);

    try {
        const response = await fetch("{{ url_for('operations.add_operation_page') }}", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            window.location.href = "{{ url_for('operations.operations_view') }}";
        } else {
            const err = await response.json();
            alert(err.error || 'Ошибка сохранения');
        }
    } catch (error) {
        console.error(error);
        alert('Ошибка сети');
    }
});
</script>
{% endblock %}
