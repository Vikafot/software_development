{% extends "base.html" %}
{% block title %}Добавить операцию{% endblock %}

{% block content %}
<div class="container">
    <h2>Добавить операцию</h2>
    <div id="msg-box" class="msg-box" style="display: none;"></div>
    
    <form id="opForm">
        <label for="type_operation">Тип:</label>
        <select name="type_operation" id="type_operation" required>
            <option value="income">Доход</option>
            <option value="expense">Расход</option>
        </select>
        
        <label for="sum">Сумма (RUB):</label>
        <input type="number" step="0.01" id="sum" name="sum" required>
        
        <label for="date">Дата:</label>
        <input type="datetime-local" id="date" name="date" required>
        
        <label for="chat_id">Chat ID (опционально):</label>
        <input type="text" id="chat_id" name="chat_id">
        
        <button type="submit">Добавить</button>
    </form>
</div>

<script>
const form = document.getElementById('opForm');
const msgBox = document.getElementById('msg-box');

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msgBox.style.display = 'none';

    const payload = {
        type_operation: form.type_operation.value,
        sum: parseFloat(form.sum.value),
        date: new Date(form.date.value).toISOString(),
        chat_id: form.chat_id.value || null
    };

    try {
        const res = await fetch("{{ url_for('operations.add_operation_page') }}", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        msgBox.style.display = 'block';

        if (res.ok) {
            window.location.href = "{{ url_for('operations.operations_view') }}?status=added";
        } else {
            msgBox.className = 'error';
            msgBox.textContent = data.error || 'Ошибка сохранения';
        }
    } catch {
        msgBox.style.display = 'block';
        msgBox.className = 'error';
        msgBox.textContent = 'Ошибка сети';
    }
});
</script>
{% endblock %}
